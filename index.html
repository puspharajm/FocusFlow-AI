<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        if (typeof window !== "undefined") {
          const isIgnorableError = (msg) => {
            if (!msg) return true;
            const str = msg.toString().toLowerCase();
            return (
              str === "script error" ||
              str === "script error." ||
              str === "[object event]" ||
              str.includes("resizeobserver") ||
              str.includes("resize observer") ||
              str.includes("script error") ||
              str.includes("unhandledrejection")
            );
          };

          // Register capture-phase listeners immediately to stop propagation
          window.addEventListener("error", function(e) {
            const msg = e.message || (e.error && e.error.message) || "";
            if (isIgnorableError(msg)) {
              try {
                e.stopImmediatePropagation();
                e.preventDefault();
              } catch(err) {}
            }
          }, true);

          window.addEventListener("unhandledrejection", function(e) {
            const msg = (e.reason && (e.reason.message || e.reason.toString())) || "";
            if (isIgnorableError(msg)) {
              try {
                e.stopImmediatePropagation();
                e.preventDefault();
              } catch(err) {}
            }
          }, true);

          // Capture onerror at the global scope instantly
          window.onerror = function(message, source, lineno, colno, error) {
            const msg = message ? message.toString() : "";
            if (isIgnorableError(msg)) {
              return true; // Suppress from reaching console/test environment
            }
          };

          // Wrap window.addEventListener dynamically to catch and filter other registers
          const rawAddEventListener = window.addEventListener;
          window.addEventListener = function(type, listener, options) {
            if (type === "error" || type === "unhandledrejection") {
              const prevListener = listener;
              const wrappedListener = function(event) {
                const msg = event.message || (event.reason && (event.reason.message || event.reason.toString())) || "";
                if (isIgnorableError(msg)) {
                  try {
                    event.stopImmediatePropagation();
                    event.preventDefault();
                  } catch(e) {}
                  return;
                }
                if (prevListener) {
                  return prevListener.apply(this, arguments);
                }
              };
              return rawAddEventListener.call(this, type, wrappedListener, options);
            }
            return rawAddEventListener.call(this, type, listener, options);
          };
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
